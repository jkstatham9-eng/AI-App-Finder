name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-read-only: false

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Generate keystore if not exists
      run: |
        if [ ! -f "release-key.jks" ]; then
          keytool -genkey -v -keystore release-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias aiappfinder -storepass android -keypass android -dname "CN=AI App Finder, OU=AI App Finder, O=AI App Finder, L=Unknown, ST=Unknown, C=US"
        fi

    - name: Create keystore.properties
      run: |
        cat > keystore.properties << EOF
        storePassword=android
        keyPassword=android
        keyAlias=aiappfinder
        storeFile=release-key.jks
        EOF

    - name: Clean and Build Release APK
      run: ./gradlew clean assembleRelease --no-daemon --stacktrace

    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: AI-App-Finder-APK
        path: app/build/outputs/apk/release/app-release.apk
        if-no-files-found: error
